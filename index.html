// ─── ONLINE SYSTEM ─────────────────────────────────────────────────────
class OnlineRoomManager {
  constructor() {
    this.rooms = {
      "1": { id: "1", players: [], host: null, status: "waiting" },
      "2": { id: "2", players: [], host: null, status: "waiting" },
      "3": { id: "3", players: [], host: null, status: "waiting" },
      "4": { id: "4", players: [], host: null, status: "waiting" }
    };
    this.listeners = [];
  }

  createRoom(roomId, hostId, hostName) {
    if (this.rooms[roomId] && this.rooms[roomId].players.length === 0) {
      this.rooms[roomId] = { 
        id: roomId, 
        players: [{id: hostId, name: hostName, isHost: true}], 
        host: hostId,
        status: "waiting"
      };
      this.notifyListeners();
      return true;
    }
    return false;
  }

  joinRoom(roomId, playerId, playerName) {
    if (this.rooms[roomId] && this.rooms[roomId].players.length < 6 && this.rooms[roomId].status === "waiting") {
      const exists = this.rooms[roomId].players.some(p => p.id === playerId);
      if (!exists) {
        this.rooms[roomId].players.push({ id: playerId, name: playerName, isHost: false });
        this.notifyListeners();
        return true;
      }
    }
    return false;
  }

  getAllRooms() {
    return Object.values(this.rooms);
  }

  getRoomDetails(roomId) {
    return this.rooms[roomId];
  }

  leaveRoom(roomId, playerId) {
    if (this.rooms[roomId]) {
      const wasHost = this.rooms[roomId].host === playerId;
      this.rooms[roomId].players = this.rooms[roomId].players.filter(p => p.id !== playerId);
      
      // Si se va el host, cambiar host al siguiente o limpiar
      if (wasHost) {
        if (this.rooms[roomId].players.length > 0) {
          this.rooms[roomId].players[0].isHost = true;
          this.rooms[roomId].host = this.rooms[roomId].players[0].id;
        } else {
          this.rooms[roomId].host = null;
          this.rooms[roomId].status = "waiting";
        }
      }
      this.notifyListeners();
    }
  }

  removePlayer(roomId, playerId) {
    this.leaveRoom(roomId, playerId);
  }

  startGame(roomId) {
    if (this.rooms[roomId]) {
      this.rooms[roomId].status = "started";
      this.notifyListeners();
      return true;
    }
    return false;
  }

  updateGameState(roomId, gameState) {
    if (this.rooms[roomId]) {
      this.rooms[roomId].gameState = gameState;
      this.notifyListeners();
    }
  }

  subscribe(callback) {
    this.listeners.push(callback);
    return () => {
      this.listeners = this.listeners.filter(l => l !== callback);
    };
  }

  notifyListeners() {
    this.listeners.forEach(cb => cb());
  }
}

// ─── UTILS ──────────────────────────────────────────────────────────
function rollDie() { return Math.floor(Math.random() * 6) + 1; }
function rollDice(n) { return Array.from({length: n}, rollDie).sort((a,b)=>b-a); }
function resolveAttack(atkDice, defDice) {
  let aLoss=0, dLoss=0;
  const pairs = Math.min(atkDice.length, defDice.length);
  for(let i=0;i<pairs;i++) {
    if(atkDice[i] > defDice[i]) dLoss++; else aLoss++;
  }
  return {aLoss, dLoss};
}
function hashStr(s) {
  let h=0; for(let i=0;i<s.length;i++) h=Math.imul(31,h)+s.charCodeAt(i)|0;
  return Math.abs(h);
}
function pointsPath(pts) {
  if(!pts.length) return "";
  return `M ${pts.map(([x,y])=>`${x.toFixed(1)} ${y.toFixed(1)}`).join(" L ")} Z`;
}
function makeTerritoryPolygon(tid) {
  const pos = TERRITORY_POSITIONS[tid];
  if(!pos) return [];
  const cont = TERRITORY_CONTINENT[tid];
  const seed = hashStr(tid);
  const base = {north_america:{rx:22,ry:14},south_america:{rx:18,ry:20},europe:{rx:16,ry:11},africa:{rx:18,ry:18},asia:{rx:18,ry:13},australia:{rx:17,ry:11}}[cont]||{rx:18,ry:14};
  const rot = ((seed%360)-180)*Math.PI/180;
  const wobble=[0.92,1.08,0.96,1.12,0.98,1.04,0.90,1.06];
  return Array.from({length:8},(_,i)=>{
    const angle=rot+(Math.PI*2*i)/8;
    const rx=base.rx*wobble[(seed+i)%8]; const ry=base.ry*wobble[(seed+i*3)%8];
    return [pos.x+Math.cos(angle)*rx+Math.sin(angle*1.3)*2.4, pos.y+Math.sin(angle)*ry+Math.cos(angle*1.1)*1.8];
  });
}
function calcReinforcements(territories, playerId) {
  const owned = territories.filter(t=>t.owner===playerId);
  let bonus = Math.max(3, Math.floor(owned.length/3));
  const ownedIds = new Set(owned.map(t=>t.id));
  for(const [cont, tids] of Object.entries(groupByContinent())) {
    if(tids.every(id=>ownedIds.has(id))) bonus += CONTINENT_BONUS[cont]||0;
  }
  return bonus;
}
function groupByContinent() {
  const g = {};
  for(const [tid,cont] of Object.entries(TERRITORY_CONTINENT)) {
    if(!g[cont]) g[cont]=[];
    g[cont].push(tid);
  }
  return g;
}
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function initGame(players) {
  const tids = Object.keys(TERRITORY_POSITIONS);
  const shuffled = shuffle(tids);
  const territories = {};
  shuffled.forEach((tid,i)=>{
    territories[tid]={id:tid, owner:players[i%players.length].id, armies:1};
  });
  const extraArmies = {2:40,3:35,4:30,5:25,6:20}[players.length]||20;
  players.forEach(p=>{
    let extra = extraArmies - Object.values(territories).filter(t=>t.owner===p.id).length;
    while(extra>0) {
      const myT = Object.values(territories).filter(t=>t.owner===p.id);
      const t = myT[Math.floor(Math.random()*myT.length)];
      t.armies++;
      extra--;
    }
  });
  const firstPlayer = players[0].id;
  return {
    phase:"reinforce",
    currentPlayer:firstPlayer,
    players,
    territories,
    reinforcementsLeft: calcReinforcements(Object.values(territories), firstPlayer),
    attackResult:null,
    winner:null,
    message:"Coloca tus refuerzos",
    turnOrder:players.map(p=>p.id),
    turnIndex:0,
  };
}

// ─── SVG MAP ──────────────────────────────────────────────────────────
function WorldMapSvg({ gameState, selectedFrom, selectedTo, onTerritoryClick }) {
  const {territories, players} = gameState;
  const territoryMap={};
  Object.values(territories).forEach(t=>{ territoryMap[t.id]=t; });
  const playerColorMap={};
  players.forEach(p=>{ playerColorMap[p.id]=p.color; });
  const fromOwner = selectedFrom ? territoryMap[selectedFrom]?.owner : null;

  return (
    <svg viewBox="0 0 880 500" preserveAspectRatio="xMidYMid meet" style={{width:"100%",height:"100%",display:"block"}}>
      <defs>
        <linearGradient id="oceanGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stopColor="#0a1e35"/>
          <stop offset="50%" stopColor="#0d2848"/>
          <stop offset="100%" stopColor="#091828"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <rect width="880" height="500" fill="url(#oceanGrad)"/>
      <g opacity="0.14">
        {Array.from({length:15},(_,i)=>i*60).map(x=>(
          <line key={"v"+x} x1={x} y1={0} x2={x} y2={500} stroke="#9fd0ff" strokeOpacity="0.08"/>
        ))}
        {Array.from({length:9},(_,i)=>i*60).map(y=>(
          <line key={"h"+y} x1={0} y1={y} x2={880} y2={y} stroke="#9fd0ff" strokeOpacity="0.08"/>
        ))}
      </g>
      <g pointerEvents="none">
        {Object.entries(CONTINENT_SHAPES).map(([name,shape])=>(
          <path key={name} d={pointsPath(shape)} fill={CONTINENT_BLOB_COLORS[name]||"#888"} stroke={CONTINENT_BLOB_COLORS[name]||"#888"} strokeOpacity="0.35" strokeWidth="1.5" opacity="0.24"/>
        ))}
      </g>
      <g opacity="0.55" pointerEvents="none">
        {Object.entries(NEIGHBORS).flatMap(([tid,nbrs])=>{
          const posA=TERRITORY_POSITIONS[tid]; if(!posA) return [];
          return nbrs.filter(nid=>tid<nid).map(nid=>{
            const posB=TERRITORY_POSITIONS[nid]; if(!posB) return null;
            const same=TERRITORY_CONTINENT[tid]===TERRITORY_CONTINENT[nid];
            return <line key={tid+"-"+nid} x1={posA.x} y1={posA.y} x2={posB.x} y2={posB.y}
              stroke={same?"rgba(255,255,255,0.10)":"rgba(255,255,255,0.08)"} strokeDasharray="4 5" strokeWidth="1"/>;
          }).filter(Boolean);
        })}
      </g>
      <g>
        {Object.entries(TERRITORY_POSITIONS).map(([tid,pos])=>{
          const ts=territoryMap[tid];
          const cont=TERRITORY_CONTINENT[tid];
          const baseColor=CONTINENT_COLORS[cont]||"#556677";
          const ownerColor=ts?(playerColorMap[ts.owner]||baseColor):baseColor;
          const isFrom=tid===selectedFrom;
          const isTo=tid===selectedTo;
          const isNbr=selectedFrom?(NEIGHBORS[selectedFrom]||[]).includes(tid):false;
          const isAttackable=isNbr&&ts&&ts.owner!==fromOwner;
          const path=pointsPath(makeTerritoryPolygon(tid));
          return (
            <g key={tid} style={{cursor:"pointer"}} onClick={()=>onTerritoryClick(tid)}>
              <path d={path} fill={isFrom?"#fff6bf":ownerColor} fillOpacity={isTo?0.98:ts?0.90:0.78}
                stroke={isFrom?"#FFD700":isTo?"#ff4444":isAttackable?"rgba(255,200,0,0.7)":"rgba(0,0,0,0.45)"}
                strokeWidth={isFrom||isTo?2.4:isAttackable?1.6:1} filter={isFrom||isTo?"url(#glow)":undefined}/>
              <circle cx={pos.x} cy={pos.y} r={isFrom||isTo?19:15}
                fill={isFrom?"#fff6bf":ownerColor} fillOpacity="0.95"
                stroke={isFrom?"#FFD700":isTo?"#ff4444":"rgba(255,255,255,0.55)"}
                strokeWidth={isFrom||isTo?2:1.2} filter={isFrom||isTo?"url(#glow)":undefined}/>
              <text x={pos.x} y={pos.y+1} textAnchor="middle" dominantBaseline="middle"
                fontSize="10" fontWeight="700" fill={isFrom?"#000":"#fff"}>
                {ts?ts.armies:"?"}
              </text>
              <text x={pos.x} y={pos.y+25} textAnchor="middle" fontSize="8" fontWeight="700"
                fill="rgba(255,255,255,0.9)">{pos.label}</text>
            </g>
          );
        })}
      </g>
      <g pointerEvents="none" opacity="0.85">
        {selectedFrom&&(NEIGHBORS[selectedFrom]||[]).map(nid=>{
          const p=TERRITORY_POSITIONS[nid]; if(!p) return null;
          return <circle key={"ring-"+nid} cx={p.x} cy={p.y} r={20} fill="none"
            stroke="rgba(255,200,0,0.75)" strokeWidth="2" strokeDasharray="5 4"/>;
        })}
      </g>
    </svg>
  );
}

  const dots = {
    1:[[50,50]],2:[[25,25],[75,75]],3:[[25,25],[50,50],[75,75]],
    4:[[25,25],[75,25],[25,75],[75,75]],5:[[25,25],[75,25],[50,50],[25,75],[75,75]],
    6:[[25,20],[75,20],[25,50],[75,50],[25,80],[75,80]]
  }[value]||[[50,50]];
  return (
    <svg width="36" height="36" viewBox="0 0 100 100">
      <rect x="2" y="2" width="96" height="96" rx="14" fill={color} stroke="rgba(255,255,255,0.4)" strokeWidth="3"/>
      {dots.map(([cx,cy],i)=><circle key={i} cx={cx} cy={cy} r="10" fill="#fff"/>)}
    </svg>

// ─── GAME LOGIC ─────────────────────────────────────────────────────────
function nextTurn(gs) {
  const alive = gs.turnOrder.filter(pid=>Object.values(gs.territories).some(t=>t.owner===pid));
  if(alive.length<=1) {
    return {...gs, phase:"ended", winner:alive[0]||null, message:"¡Juego terminado!"};
  }
  let nextIdx = (gs.turnIndex+1)%gs.turnOrder.length;
  while(!alive.includes(gs.turnOrder[nextIdx])) {
    nextIdx=(nextIdx+1)%gs.turnOrder.length;
  }
  const nextPid = gs.turnOrder[nextIdx];
  const reinf = calcReinforcements(Object.values(gs.territories), nextPid);
  return {...gs, phase:"reinforce", currentPlayer:nextPid, turnIndex:nextIdx,
    reinforcementsLeft:reinf, attackResult:null,
    message:`Es el turno de ${gs.players.find(p=>p.id===nextPid)?.name||"?"}. Coloca ${reinf} refuerzos.`};
}

function applyReinforce(gs, toTerritory, armies) {
  if(!toTerritory||armies<1) return gs;
  const actual = Math.min(armies, gs.reinforcementsLeft);
  const territories = {...gs.territories, [toTerritory]:{...gs.territories[toTerritory], armies:gs.territories[toTerritory].armies+actual}};
  const left = gs.reinforcementsLeft - actual;
  const newGs = {...gs, territories, reinforcementsLeft:left};
  if(left<=0) return {...newGs, phase:"attack", message:"Fase de Ataque — selecciona tu territorio para atacar"};
  return {...newGs, message:`${left} refuerzos restantes`};
}

function applyAttack(gs, fromT, toT, blitz=false) {
  const from = gs.territories[fromT];
  const to = gs.territories[toT];
  if(!from||!to) return gs;
  if(from.armies<2) return gs;

  const territories = {...gs.territories};
  let totalAtkLoss=0, totalDefLoss=0, rounds=0;
  let atkDice=[], defDice=[], aLoss=0, dLoss=0;

  if(blitz) {
    let atkArmies=from.armies, defArmies=to.armies;
    while(atkArmies>=2&&defArmies>0) {
      const nd=Math.min(3,atkArmies-1), dd=Math.min(2,defArmies);
      const ad=rollDice(nd), dd2=rollDice(dd);
      const {aLoss:al,dLoss:dl}=resolveAttack(ad,dd2);
      atkArmies-=al; defArmies-=dl; totalAtkLoss+=al; totalDefLoss+=dl;
      rounds++; atkDice=ad; defDice=dd2; aLoss=al; dLoss=dl;
    }
    const conquered=defArmies<=0;
    territories[fromT]={...from,armies:from.armies-totalAtkLoss-(conquered?Math.min(3,from.armies-totalAtkLoss-1):0)};
    if(conquered) territories[toT]={...to,owner:from.owner,armies:Math.min(3,from.armies-totalAtkLoss-1)};
    else territories[toT]={...to,armies:defArmies};
    const attackResult={attackerDice:atkDice,defenderDice:defDice,attackerLosses:aLoss,defenderLosses:dLoss,isBlitz:true,totalAttackerLosses:totalAtkLoss,totalDefenderLosses:totalDefLoss,rounds,territoryConquered:conquered};
    return {...gs,territories,attackResult};
  } else {
    const nd=Math.min(3,from.armies-1), dd=Math.min(2,to.armies);
    atkDice=rollDice(nd); defDice=rollDice(dd);
    const res=resolveAttack(atkDice,defDice);
    aLoss=res.aLoss; dLoss=res.dLoss;
    const newAtkArmies=from.armies-aLoss;
    const newDefArmies=to.armies-dLoss;
    const conquered=newDefArmies<=0;
    territories[fromT]={...from,armies:newAtkArmies-(conquered?Math.min(nd,newAtkArmies-1):0)};
    if(conquered) territories[toT]={...to,owner:from.owner,armies:Math.min(nd,newAtkArmies-1)};
    else territories[toT]={...to,armies:newDefArmies};
    const attackResult={attackerDice:atkDice,defenderDice:defDice,attackerLosses:aLoss,defenderLosses:dLoss,isBlitz:false,territoryConquered:conquered};
    return {...gs,territories,attackResult};
  }
}

function applyFortify(gs, fromT, toT, armies) {
  const from = gs.territories[fromT];
  if(!from||armies<1) return nextTurn(gs);
  const actual=Math.min(armies,from.armies-1);
  const territories={...gs.territories,
    [fromT]:{...from,armies:from.armies-actual},
    [toT]:{...gs.territories[toT],armies:gs.territories[toT].armies+actual}
  };
  return nextTurn({...gs,territories});
}

function GameScreen({initialPlayers, onBack, isOnline = false, roomId = null}) {
  const [gs, setGs] = useState(()=>initGame(initialPlayers));
  const [selectedFrom, setSelectedFrom] = useState(null);
  const [selectedTo, setSelectedTo] = useState(null);
  const [reinforceAmt, setReinforceAmt] = useState(1);
  const [fortifyAmt, setFortifyAmt] = useState(1);
  const [showTurnBanner, setShowTurnBanner] = useState(true);

  const currentPlayer = gs.players.find(p=>p.id===gs.currentPlayer);

  useEffect(()=>{
    setShowTurnBanner(true);
    setSelectedFrom(null);
    setSelectedTo(null);
    setReinforceAmt(1);
    setFortifyAmt(1);
    const t = setTimeout(()=>setShowTurnBanner(false),2500);
    return ()=>clearTimeout(t);
  },[gs.currentPlayer]);

  useEffect(() => {
    if (isOnline && roomId) {
      roomManager.updateGameState(roomId, gs);
    }
  }, [gs, isOnline, roomId]);

  const handleTerritoryClick = (clicked) => {
    if(gs.phase==="ended") return;
    const ts = gs.territories;
    const clickedT = ts[clicked];
    if(!clickedT) return;

    if(gs.phase==="reinforce") {
      if(clickedT.owner===gs.currentPlayer) {
        setSelectedTo(clicked); setSelectedFrom(null);
      }
    } else if(gs.phase==="attack") {
      if(!selectedFrom) {
        if(clickedT.owner===gs.currentPlayer&&clickedT.armies>=2) {
          setSelectedFrom(clicked); setSelectedTo(null);
        }
      } else {
        if(clicked===selectedFrom){setSelectedFrom(null);return;}
        if(clickedT.owner!==gs.currentPlayer&&(NEIGHBORS[selectedFrom]||[]).includes(clicked)) {
          setSelectedTo(clicked);
        } else if(clickedT.owner===gs.currentPlayer&&clickedT.armies>=2) {
          setSelectedFrom(clicked); setSelectedTo(null);
        }
      }
    } else if(gs.phase==="fortify") {
      if(!selectedFrom) {
        if(clickedT.owner===gs.currentPlayer&&clickedT.armies>=2) {
          setSelectedFrom(clicked); setSelectedTo(null);
        }
      } else {
        if(clicked===selectedFrom){setSelectedFrom(null);return;}
        if(clickedT.owner===gs.currentPlayer&&(NEIGHBORS[selectedFrom]||[]).includes(clicked)) {
          setSelectedTo(clicked);
        } else if(clickedT.owner===gs.currentPlayer&&clickedT.armies>=2) {
          setSelectedFrom(clicked); setSelectedTo(null);
        }
      }
    }
  };

  const doReinforce = (armies) => {
    if(!selectedTo) return;
    setGs(g=>applyReinforce(g,selectedTo,armies));
    setSelectedTo(null); setReinforceAmt(1);
  };

  const doAttack = (blitz) => {
    if(!selectedFrom||!selectedTo) return;
    setGs(g=>applyAttack(g,selectedFrom,selectedTo,blitz));
    setSelectedFrom(null); setSelectedTo(null);
  };

  const doEndAttack = () => {
    setGs(g=>({...g,phase:"fortify",attackResult:null,message:"Fase de Fortalecer — mueve ejércitos (opcional)"}));
    setSelectedFrom(null); setSelectedTo(null);
  };

  const doFortify = () => {
    if(!selectedFrom||!selectedTo) { setGs(g=>nextTurn(g)); return; }
    const max=(gs.territories[selectedFrom]?.armies||1)-1;
    setGs(g=>applyFortify(g,selectedFrom,selectedTo,Math.min(fortifyAmt,max)));
    setSelectedFrom(null); setSelectedTo(null); setFortifyAmt(1);
  };

  const doSkipFortify = () => { setGs(g=>nextTurn(g)); setSelectedFrom(null); setSelectedTo(null); };

  const fromT = selectedFrom?gs.territories[selectedFrom]:null;

  return (
    <div style={{background:"#050d1a",minHeight:"100vh",display:"flex",flexDirection:"column",fontFamily:"Arial,sans-serif",position:"relative"}}>

      {showTurnBanner&&gs.phase!=="ended"&&(
        <div style={{position:"fixed",inset:0,display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,background:"rgba(0,0,0,0.75)",pointerEvents:"none"}}>
          <div style={{background:`linear-gradient(135deg,${currentPlayer?.color||"#FFD700"}22,rgba(0,0,0,0.9))`,border:`2px solid ${currentPlayer?.color||"#FFD700"}`,borderRadius:"20px",padding:"32px 48px",textAlign:"center"}}>
            <p style={{color:"#aabbcc",fontSize:"13px",letterSpacing:"2px",marginBottom:"8px"}}>TURNO DE</p>
            <p style={{color:currentPlayer?.color||"#FFD700",fontSize:"32px",fontWeight:"bold",fontFamily:"Georgia,serif"}}>{currentPlayer?.name||"?"}</p>
            <p style={{color:"#556677",fontSize:"12px",marginTop:"8px"}}>Fase: {phaseLabel(gs.phase)}</p>
            {isOnline && <p style={{color:"#88aaff",fontSize:"10px",marginTop:"6px"}}>🌐 Sala: {roomId}</p>}
          </div>
        </div>
      )}

      <div style={{background:"rgba(0,0,0,0.92)",borderBottom:"2px solid #FFD70055",padding:"7px 14px",display:"flex",alignItems:"center",gap:"14px",flexWrap:"wrap",flexShrink:0}}>
        <span style={{color:"#FFD700",fontFamily:"Georgia,serif",fontSize:"20px",fontWeight:"bold"}}>RISK</span>
        {isOnline && <span style={{color:"#88aaff",fontSize:"12px"}}>🌐 Online - Sala {roomId}</span>}
        <div style={{display:"flex",gap:"5px",alignItems:"center",flexWrap:"wrap",flex:1}}>
          {gs.players.map(p=>{
            const tCount=Object.values(gs.territories).filter(t=>t.owner===p.id).length;
            const isCur=gs.currentPlayer===p.id;
            if(tCount===0) return null;
            return (
              <div key={p.id} style={{display:"flex",alignItems:"center",gap:"4px",padding:"2px 7px",borderRadius:"12px",border:`2px solid ${isCur?p.color:"transparent"}`,background:isCur?`${p.color}22`:"transparent"}}>
                <div style={{width:"9px",height:"9px",borderRadius:"50%",background:p.color}}/>
                <span style={{color:p.color,fontSize:"11px",fontWeight:"bold"}}>{p.name}({tCount}){isCur&&" ▶"}</span>
              </div>
            );
          })}
        </div>
        <button onClick={onBack} style={{background:"none",border:"1px solid #334455",borderRadius:"6px",color:"#556677",cursor:"pointer",fontSize:"11px",padding:"4px 8px"}}>✕ Salir</button>
      </div>

      <div style={{display:"flex",flex:1,overflow:"hidden",minHeight:0}}>
        <div style={{flex:1,overflow:"hidden",background:"#050d1a"}}>
          <WorldMapSvg gameState={gs} selectedFrom={selectedFrom} selectedTo={selectedTo} onTerritoryClick={handleTerritoryClick}/>
        </div>

        <div style={{width:"270px",minWidth:"270px",background:"rgba(2,8,18,0.97)",borderLeft:"1px solid #FFD70033",display:"flex",flexDirection:"column",padding:"12px",gap:"9px",overflowY:"auto",maxHeight:"100%"}}>

          <div style={{background:`${currentPlayer?.color||"#FFD700"}18`,border:`1px solid ${currentPlayer?.color||"#FFD700"}44`,borderRadius:"8px",padding:"9px"}}>
            <p style={{color:"#FFD700",fontSize:"10px",fontWeight:"bold",marginBottom:"2px",textTransform:"uppercase",letterSpacing:"1px"}}>Fase: {phaseLabel(gs.phase)}</p>
            <p style={{color:currentPlayer?.color||"#fff",fontSize:"13px",fontWeight:"bold"}}>{currentPlayer?.name||"?"}</p>
            <p style={{color:"#88aacc",fontSize:"10px",marginTop:"3px"}}>{gs.message}</p>
          </div>

          {gs.winner&&(
            <div style={{background:"rgba(255,215,0,0.12)",border:"2px solid #FFD700",borderRadius:"10px",padding:"14px",textAlign:"center"}}>
              <p style={{color:"#FFD700",fontSize:"20px",fontWeight:"bold",fontFamily:"Georgia,serif"}}>🏆 VICTORIA!</p>
              <p style={{color:"#fff",fontSize:"14px",marginTop:"4px"}}>{gs.players.find(p=>p.id===gs.winner)?.name}</p>
              <button onClick={onBack} style={{...btn("#8B0000","#cc2200"),marginTop:"10px",padding:"8px 16px",fontSize:"13px"}}>Volver</button>
            </div>
          )}

          {!gs.winner&&(
            <div style={{display:"flex",flexDirection:"column",gap:"7px"}}>

              {gs.phase==="reinforce"&&<>
                <p style={{color:"#aabbcc",fontSize:"12px"}}>Refuerzos: <strong style={{color:"#FFD700",fontSize:"14px"}}>{gs.reinforcementsLeft}</strong></p>
                {selectedTo?(
                  <>
                    <p style={{color:"#ccc",fontSize:"11px"}}>Territorio: <strong style={{color:"#FFD700"}}>{TERRITORY_POSITIONS[selectedTo]?.label}</strong></p>
                    <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                      <button onClick={()=>setReinforceAmt(m=>Math.max(1,m-1))} style={smBtn}>−</button>
                      <span style={{color:"#FFD700",fontWeight:"bold",minWidth:"26px",textAlign:"center"}}>{Math.min(reinforceAmt,gs.reinforcementsLeft)}</span>
                      <button onClick={()=>setReinforceAmt(m=>Math.min(gs.reinforcementsLeft,m+1))} style={smBtn}>+</button>
                      <button onClick={()=>doReinforce(Math.min(reinforceAmt,gs.reinforcementsLeft))} style={{...btn("#226600","#33aa00"),padding:"3px 10px",fontSize:"11px",flex:1}}>Reforzar</button>
                    </div>
                    <button onClick={()=>doReinforce(gs.reinforcementsLeft)} style={{...btn("#554400","#886600"),fontSize:"11px"}}>Colocar todos ({gs.reinforcementsLeft})</button>
                  </>
                ):(
                  <p style={{color:"#556677",fontSize:"11px"}}>Haz clic en uno de tus territorios para reforzar</p>
                )}
              </>}

              {gs.phase==="attack"&&<>
                {!selectedFrom&&<p style={{color:"#556677",fontSize:"11px"}}>Clic en un territorio tuyo (2+ ejércitos) para atacar</p>}
                {selectedFrom&&!selectedTo&&<p style={{color:"#aabbcc",fontSize:"11px"}}>Desde: <strong style={{color:"#FFD700"}}>{TERRITORY_POSITIONS[selectedFrom]?.label}</strong></p>}
                {selectedFrom&&selectedTo&&<>
                  <p style={{color:"#ccc",fontSize:"11px"}}>
                    <strong style={{color:"#FFD700"}}>{TERRITORY_POSITIONS[selectedFrom]?.label}</strong>
                    <span style={{color:"#666"}}> vs </span>
                    <strong style={{color:"#ff4444"}}>{TERRITORY_POSITIONS[selectedTo]?.label}</strong>
                  </p>
                  <div style={{display:"flex",flexDirection:"column",gap:"5px"}}>
                    <button onClick={()=>doAttack(false)} style={btn("#8B0000","#cc2200")}>⚔️ ATACAR (1 ronda)</button>
                    <button onClick={()=>doAttack(true)} style={{...btn("#6B0000","#ff3300"),boxShadow:"0 4px 15px #ff330055"}}>💥 BLITZ — ATACAR TODO</button>
                  </div>
                </>}
                <button onClick={doEndAttack} style={{...btn("#443300","#665500"),fontSize:"11px"}}>Terminar ataques →</button>
              </>}

              {gs.phase==="fortify"&&<>
                {!selectedFrom&&<p style={{color:"#556677",fontSize:"11px"}}>Opcional: mueve ejércitos entre territorios adyacentes</p>}
                {selectedFrom&&!selectedTo&&<p style={{color:"#aabbcc",fontSize:"11px"}}>Desde: <strong style={{color:"#FFD700"}}>{TERRITORY_POSITIONS[selectedFrom]?.label}</strong></p>}
                {selectedFrom&&selectedTo&&(()=>{
                  const max=(fromT?.armies||1)-1;
                  return <>
                    <p style={{color:"#ccc",fontSize:"11px"}}>
                      <strong style={{color:"#FFD700"}}>{TERRITORY_POSITIONS[selectedFrom]?.label}</strong>
                      <span style={{color:"#666"}}> → </span>
                      <strong style={{color:"#2ecc71"}}>{TERRITORY_POSITIONS[selectedTo]?.label}</strong>
                    </p>
                    <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                      <button onClick={()=>setFortifyAmt(m=>Math.max(1,m-1))} style={smBtn}>−</button>
                      <span style={{color:"#FFD700",fontWeight:"bold",minWidth:"26px",textAlign:"center"}}>{Math.min(fortifyAmt,max)}</span>
                      <button onClick={()=>setFortifyAmt(m=>Math.min(max,m+1))} style={smBtn}>+</button>
                    </div>
                    <button onClick={doFortify} style={btn("#226600","#33aa00")}>Fortalecer</button>
                  </>;
                })()}
                <button onClick={doSkipFortify} style={btn("#003366","#1a5c9e")}>Terminar turno →</button>
              </>}
            </div>
          )}

          {gs.attackResult&&<AttackResultPanel result={gs.attackResult}/>}

          <div style={{marginTop:"auto",borderTop:"1px solid #112233",paddingTop:"9px"}}>
            <p style={{color:"#334455",fontSize:"9px",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"1px"}}>Territorios / Ejércitos</p>
            {gs.players.map(p=>{
              const tCount=Object.values(gs.territories).filter(t=>t.owner===p.id).length;
              const aCount=Object.values(gs.territories).filter(t=>t.owner===p.id).reduce((s,t)=>s+t.armies,0);
              const eliminated=tCount===0;
              return (
                <div key={p.id} style={{display:"flex",alignItems:"center",gap:"5px",marginBottom:"3px",opacity:eliminated?0.35:1}}>
                  <div style={{width:"7px",height:"7px",borderRadius:"50%",background:p.color,flexShrink:0}}/>
                  <span style={{color:p.id===gs.currentPlayer?p.color:"#778899",fontSize:"10px",flex:1}}>{p.name}{eliminated?" ✝":""}</span>
                  <span style={{color:"#445566",fontSize:"9px"}}>{tCount}t/{aCount}a</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("home");
  const [players, setPlayers] = useState(null);
  const [onlineSession, setOnlineSession] = useState(null);

  if(screen==="home") return <HomeScreen 
    onStart={()=>setScreen("setup")}
    onOnline={()=>setScreen("online-home")}
  />;
  
  if(screen==="online-home") return <OnlineHomeScreen 
    onBack={()=>setScreen("home")}
    onEnterRoom={(playerId, playerName, roomId, isHost)=>{
      setOnlineSession({playerId, playerName, roomId, isHost});
      setScreen("room-lobby");
    }}
  />;

  if(screen==="room-lobby" && onlineSession) return <RoomLobbyScreen
    roomId={onlineSession.roomId}
    playerId={onlineSession.playerId}
    playerName={onlineSession.playerName}
    isHost={onlineSession.isHost}
    onBack={()=>{
      roomManager.leaveRoom(onlineSession.roomId, onlineSession.playerId);
      setOnlineSession(null);
      setScreen("online-home");
    }}
    onStartGame={()=>{
      const roomDetails = roomManager.getRoomDetails(onlineSession.roomId);
      const gamePlayers = roomDetails.players.map((p, i) => ({
        id: "p" + i,
        name: p.name,
        color: PLAYER_COLORS[i]
      }));
      setPlayers(gamePlayers);
      setScreen("online-game");
    }}
  />;
  
  if(screen==="setup") return <SetupScreen 
    onStart={ps=>{setPlayers(ps);setScreen("game");}} 
    onBack={()=>setScreen("home")}
  />;
  
  if(screen==="game"&&players) return <GameScreen 
    initialPlayers={players} 
    onBack={()=>{setPlayers(null);setScreen("home");}}
  />;
  
  if(screen==="online-game"&&players && onlineSession) return <GameScreen 
    initialPlayers={players}
    onBack={()=>{
      roomManager.leaveRoom(onlineSession.roomId, onlineSession.playerId);
      setOnlineSession(null);
      setPlayers(null);
      setScreen("home");
    }}
    isOnline={true}
    roomId={onlineSession.roomId}
  />;
  
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
